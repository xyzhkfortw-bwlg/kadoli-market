<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卡多里時光森林 × 市集攤商報名</title>

<meta property="og:title" content="🌲 卡多里時光森林 × 市集攤商招募報名" />
<meta property="og:description" content="台中大坑風景區新亮點！誠邀露營、美食、手作夥伴加入，共同打造自然體驗市集。" />
<meta property="og:url" content="https://xyzhkfortw-bwlg.github.io/kadoli-market/" />
<meta property="og:image" content="https://xyzhkfortw-bwlg.github.io/kadoli-market/IMG_5093.jpg" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image">

<style>
:root {
  --green-dark:  #1A3A2A;
  --green-mid:   #2C6E49;
  --green-light: #4CAF50;
  --gold:        #F9A825;
  --cream:       #FAFDF6;
  --card-bg:     #FFFFFF;
  --text:        #1A3A2A;
  --muted:       #5C7A6B;
  --border:      #C8DDD0;
  --danger:      #D32F2F;
  --radius:      14px;
  --shadow:      0 4px 20px rgba(44,110,73,.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system,"Microsoft JhengHei","Noto Sans TC",sans-serif;
       background: var(--cream); color: var(--text); min-height: 100vh; }

/* ── 海報容器 ── */
.poster-container { width: 100%; max-width: 800px; margin: 0 auto; line-height: 0; }
.poster-img { width: 100%; height: auto; display: block; }

/* ── 頂部 HERO ── */
.hero { background: var(--green-dark); color:#fff; padding:28px 20px 20px;
        text-align:center; position:relative; overflow:hidden; }
.hero-logo { font-size:13px; color:#97C9AB; letter-spacing:2px; margin-bottom:8px; }
.hero-title { font-size:22px; font-weight:700; line-height:1.3; margin-bottom:6px; }
.hero-title span { color:var(--gold); }
.hero-sub { font-size:12px; color:#97C9AB; }

/* ── 進度條 ── */
.progress-wrap { background:var(--green-dark); padding:0 20px 16px; }
.progress-bar { background:rgba(255,255,255,.2); border-radius:99px; height:6px; }
.progress-fill { height:6px; border-radius:99px; background:var(--gold); transition:width .4s ease; }
.step-labels { display:flex; justify-content:space-between; margin-top:6px; }
.step-label { font-size:10px; color:#97C9AB; }
.step-label.active { color:var(--gold); font-weight:600; }

/* ── 公告與卡片元件 ── */
.notice { background:linear-gradient(135deg,var(--green-mid),var(--green-dark)); margin:16px; border-radius:var(--radius); padding:14px 16px; display:flex; align-items:flex-start; gap:10px; }
.notice-text { font-size:12px; color:#C8E6C9; line-height:1.7; }
.card { background:var(--card-bg); margin:12px 16px; border-radius:var(--radius); padding:20px; box-shadow:var(--shadow); }
.card-title { font-size:15px; font-weight:700; color:var(--green-mid); margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.card-title::before { content:''; display:inline-block; width:4px; height:18px; background:var(--gold); border-radius:2px; }

/* ── 表單元件 ── */
.step-page { display:none; }
.step-page.active { display:block; }
.form-group { margin-bottom:16px; }
label { display:block; font-size:13px; font-weight:600; color:var(--text); margin-bottom:6px; }
input, textarea, select { width:100%; padding:12px 14px; border:1.5px solid var(--border); border-radius:10px; font-size:14px; }
.error-msg { font-size:11px; color:var(--danger); margin-top:4px; display:none; }
.has-error input { border-color:var(--danger); }
.has-error .error-msg { display:block; }

/* ── 選項樣式 ── */
.cat-grid, .size-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.cat-item, .size-item { border:2px solid var(--border); border-radius:12px; padding:12px; text-align:center; background:#fff; cursor:pointer; }
.cat-item.selected, .size-item.selected { border-color:var(--green-mid); background:#EBF5EB; }
.check-item { display:flex; align-items:center; gap:12px; padding:12px; border:1.5px solid var(--border); border-radius:10px; margin-bottom:10px; background:#fff; }

/* ── 按鈕與載入 ── */
.btn-row { padding:12px 16px 32px; display:flex; gap:10px; }
.btn { flex:1; padding:15px; border-radius:12px; border:none; font-size:15px; font-weight:700; cursor:pointer; }
.btn-main { background:var(--green-mid); color:#fff; }
.btn-submit { background:var(--gold); color:#fff; }
.loading-overlay { position:fixed; inset:0; background:rgba(255,255,255,.85); z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.loading-overlay.hidden { display:none; }
.summary-row { display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #eee; font-size:13px; }
</style>
</head>
<body>

<div class="poster-container">
  <img src="IMG_5093.jpg" alt="卡多里市集海報" class="poster-img">
</div>

<div class="hero">
  <div class="hero-logo">🌲 KADORI TIME FOREST</div>
  <div class="hero-title">卡多里時光森林<br><span>市集攤商招募報名</span></div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:25%"></div></div>
  <div class="step-labels">
    <span class="step-label active" id="lbl1">①基本資料</span>
    <span class="step-label" id="lbl2">②攤位類型</span>
    <span class="step-label" id="lbl3">③需求說明</span>
    <span class="step-label" id="lbl4">④確認送出</span>
  </div>
</div>

<div class="step-page active" id="step1">
  <div class="card">
    <div class="card-title">基本聯絡資料</div>
    <div class="form-group" id="fg-businessName">
      <label>攤商名稱 <span style="color:red">*</span></label>
      <input type="text" id="businessName">
      <div class="error-msg">請輸入名稱</div>
    </div>
    <div class="form-group" id="fg-contactName">
      <label>聯絡人 <span style="color:red">*</span></label>
      <input type="text" id="contactName">
    </div>
    <div class="form-group" id="fg-phone">
      <label>手機號碼 <span style="color:red">*</span></label>
      <input type="tel" id="phone" maxlength="10">
    </div>
    <div class="form-group">
      <label>LINE ID</label>
      <input type="text" id="lineId">
    </div>
    <div class="form-group">
      <label>電子信箱</label>
      <input type="email" id="email">
    </div>
  </div>
</div>

<div class="step-page" id="step2">
  <div class="card">
    <div class="card-title">攤商類別</div>
    <div class="cat-grid">
      <div class="cat-item" data-cat="🏕️ 露營裝備">露營裝備</div>
      <div class="cat-item" data-cat="🍳 戶外料理">戶外料理</div>
      <div class="cat-item" data-cat="☕ 咖啡茶飲">咖啡茶飲</div>
      <div class="cat-item" data-cat="🧺 手作體驗">手作體驗</div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">設備需求</div>
    <label class="check-item"><input type="checkbox" name="equip" value="⚡ 需要用電"> ⚡ 需要用電</label>
    <label class="check-item"><input type="checkbox" name="equip" value="💧 需要用水"> 💧 需要用水</label>
  </div>
  <div class="card">
    <div class="card-title">攤位尺寸</div>
    <div class="size-grid">
      <div class="size-item" data-size="標準 3x3m">標準 3x3m</div>
      <div class="size-item" data-size="餐車停車格">餐車格</div>
    </div>
  </div>
</div>

<div class="step-page" id="step3">
  <div class="card">
    <div class="card-title">需求說明</div>
    <div class="form-group">
      <label>預估日營業額 <span style="color:red">*</span></label>
      <select id="estimatedRevenue">
        <option value="">請選擇</option>
        <option value="5000以下">5000以下</option>
        <option value="5000-1萬">5000-1萬</option>
        <option value="1萬以上">1萬以上</option>
      </select>
    </div>
    <div class="form-group">
      <label>商品簡介 <span style="color:red">*</span></label>
      <textarea id="productDesc"></textarea>
    </div>
    <div class="form-group">
      <label>備註</label>
      <textarea id="notes"></textarea>
    </div>
  </div>
</div>

<div class="step-page" id="step4">
  <div class="card">
    <div class="card-title">最終確認</div>
    <div id="summaryContent"></div>
  </div>
</div>

<div class="btn-row" id="btnRow">
  <button class="btn" id="btnBack" onclick="prevStep()" style="display:none">上一步</button>
  <button class="btn btn-main" id="btnNext" onclick="nextStep()">下一步</button>
</div>

<div id="success-screen" style="display:none; text-align:center; padding:50px;">
  <h2>🎉 報名成功！</h2>
  <p id="appIdDisplay"></p>
  <button class="btn btn-main" onclick="location.reload()">再填一份</button>
</div>

<div class="loading-overlay hidden" id="loadingOverlay">正在處理中...</div>

<script>
let currentStep = 1;
let selectedCat = '', selectedSize = '';
const GAS_URL = 'https://script.google.com/macros/s/AKfycby6vIPFJrOn35cUMkiMM9D4qW1hMcrLDPWPEFOypJMEHImHNDYS6tb5q50uM4mm2fY/exec';

document.querySelectorAll('.cat-item').forEach(el => el.onclick = () => {
  document.querySelectorAll('.cat-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected'); selectedCat = el.dataset.cat;
});
document.querySelectorAll('.size-item').forEach(el => el.onclick = () => {
  document.querySelectorAll('.size-item').forEach(e => e.classList.remove('selected'));
  el.classList.add('selected'); selectedSize = el.dataset.size;
});

function nextStep() {
  if(currentStep === 4) { submitForm(); return; }
  document.getElementById('step'+currentStep).classList.remove('active');
  currentStep++;
  document.getElementById('step'+currentStep).classList.add('active');
  if(currentStep === 4) buildSummary();
  updateUI();
}
function prevStep() {
  document.getElementById('step'+currentStep).classList.remove('active');
  currentStep--;
  document.getElementById('step'+currentStep).classList.add('active');
  updateUI();
}
function updateUI() {
  document.getElementById('progressFill').style.width = (currentStep/4*100)+'%';
  document.getElementById('btnBack').style.display = currentStep > 1 ? 'block' : 'none';
  document.getElementById('btnNext').innerText = currentStep === 4 ? '確認送出' : '下一步';
}
function buildSummary() {
  const equip = [...document.querySelectorAll('input[name=equip]:checked')].map(e=>e.value).join(', ') || '無';
  const data = [
    ['店名', document.getElementById('businessName').value],
    ['類別', selectedCat],
    ['設備', equip],
    ['備註', document.getElementById('notes').value || '無']
  ];
  document.getElementById('summaryContent').innerHTML = data.map(r => `<div class="summary-row"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('');
}
async function submitForm() {
  const appId = 'KD-' + Date.now().toString(36).toUpperCase();
  const payload = {
    appId,
    businessName: document.getElementById('businessName').value,
    contactName: document.getElementById('contactName').value,
    phone: document.getElementById('phone').value,
    email: document.getElementById('email').value,
    lineId: document.getElementById('lineId').value,
    category: selectedCat,
    stallSize: selectedSize,
    equipment: [...document.querySelectorAll('input[name=equip]:checked')].map(e=>e.value).join(','),
    productDesc: document.getElementById('productDesc').value,
    notes: document.getElementById('notes').value
  };
  document.getElementById('loadingOverlay').classList.remove('hidden');
  await fetch(GAS_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
  document.getElementById('loadingOverlay').classList.add('hidden');
  document.getElementById('step4').style.display = 'none';
  document.getElementById('btnRow').style.display = 'none';
  document.getElementById('success-screen').style.display = 'block';
  document.getElementById('appIdDisplay').innerText = '報名編號：' + appId;
}
</script>
</body>
</html>
