<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>卡多里時光森林 × 攤商報名</title>
<style>
:root {
  --forest-bg: #0A1A12;
  --forest-card: rgba(20, 40, 30, 0.7);
  --gold: #D4AF37;
  --gold-glow: rgba(212, 175, 55, 0.4);
  --text-main: #E0E8E3;
  --text-muted: #88A090;
  --danger: #FF6B6B;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body { 
  font-family: -apple-system, "Noto Sans TC", sans-serif;
  background: var(--forest-bg);
  background-image: radial-gradient(circle at top right, #153024 0%, #0A1A12 100%);
  color: var(--text-main); 
  line-height: 1.6;
  min-height: 100vh;
}

/* ── 手機版 Hero ── */
.hero { padding: 45px 20px 25px; text-align: center; }
.hero-logo { font-size: 12px; color: var(--gold); letter-spacing: 4px; margin-bottom: 8px; font-weight: bold; }
.hero-title { font-size: 26px; font-weight: 800; color: #FFF; text-shadow: 0 0 15px var(--gold-glow); }
.hero-title span { color: var(--gold); }

/* ── 進度條 ── */
.progress-wrap { padding: 0 30px 25px; }
.progress-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 4px; }
.progress-fill { height: 100%; border-radius: 10px; background: var(--gold); box-shadow: 0 0 8px var(--gold); transition: width .4s ease; }
.step-labels { display: flex; justify-content: space-between; margin-top: 12px; }
.step-label { font-size: 11px; color: var(--text-muted); transition: 0.3s; }
.step-label.active { color: var(--gold); font-weight: bold; }

/* ── 招商亮點卡片 ── */
.info-banner {
  margin: 0 20px 20px; padding: 20px;
  background: linear-gradient(135deg, rgba(212,175,55,0.15), transparent);
  border: 1px solid var(--gold-glow); border-radius: var(--radius);
}
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
.info-item { font-size: 12px; color: var(--text-main); border-left: 2px solid var(--gold); padding-left: 10px; }
.info-item small { display: block; color: var(--gold); font-weight: bold; font-size: 11px; margin-bottom: 2px; }

/* ── 表單卡片 ── */
.card { 
  background: var(--forest-card); margin: 0 16px 20px; padding: 24px;
  border-radius: var(--radius); border: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.card-title { font-size: 16px; font-weight: bold; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
.card-title::before { content:''; width:4px; height:16px; background: var(--gold); border-radius: 2px; }

/* ── 輸入框樣式 ── */
.form-group { margin-bottom: 20px; position: relative; }
label { display: block; font-size: 13px; margin-bottom: 8px; color: var(--text-muted); }
label .req { color: var(--danger); margin-left: 4px; }
input, select, textarea {
  width: 100%; padding: 14px; background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  color: #FFF; font-size: 16px; transition: 0.3s;
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--gold); background: rgba(0,0,0,0.5); }

/* ── 選擇格 ── */
.grid-select { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.option-box { 
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
  padding: 15px 10px; text-align: center; border-radius: 12px; transition: 0.3s; cursor: pointer;
}
.option-box.selected { border-color: var(--gold); background: rgba(212,175,55,0.15); color: var(--gold); font-weight: bold; }
.option-box i { display: block; font-size: 20px; margin-bottom: 5px; font-style: normal; }

/* ── 複選框 ── */
.check-item { 
  display: flex; align-items: center; gap: 12px; padding: 14px; 
  background: rgba(255,255,255,0.03); border-radius: 10px; margin-bottom: 10px; cursor: pointer;
}
.check-item input { width: 20px; height: 20px; accent-color: var(--gold); }

/* ── 按鈕 ── */
.btn-row { padding: 10px 20px 50px; display: flex; gap: 12px; }
.btn { flex: 1; padding: 16px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
.btn:active { transform: scale(0.98); }
.btn-main { background: linear-gradient(to right, #D4AF37, #F9E29D); color: #2A1F07; box-shadow: 0 5px 15px rgba(212,175,55,0.3); }
.btn-back { background: rgba(255,255,255,0.1); color: #FFF; }

.step-page { display: none; }
.step-page.active { display: block; animation: fadeInUp 0.4s ease-out; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

.error-msg { color: var(--danger); font-size: 11px; margin-top: 5px; display: none; }
.has-error input, .has-error select, .has-error textarea { border-color: var(--danger); }
.has-error .error-msg { display: block; }

#summaryContent p { margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); }
#summaryContent b { color: var(--gold); width: 80px; display: inline-block; }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-logo">🌲 KADORI TIME FOREST</div>
  <div class="hero-title">卡多里<span>時光森林</span>市集</div>
</div>

<div class="progress-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:25%"></div></div>
  <div class="step-labels">
    <span class="step-label active" id="lbl1">基本資料</span>
    <span class="step-label" id="lbl2">類別需求</span>
    <span class="step-label" id="lbl3">營運說明</span>
    <span class="step-label" id="lbl4">確認送出</span>
  </div>
</div>

<div class="step-page active" id="step1">
  <div class="info-banner">
    <div class="info-grid">
      <div class="info-item"><small>進駐優勢</small>採取擇優錄取制，「免場租」低門檻，降低進駐風險。</div>
      <div class="info-item"><small>合作模式</small>採審核制與「合作分潤模式」，共享收益。</div>
      <div class="info-item"><small>流量核心</small>大坑精華地段，假日逾 2,000 人次強勁人流。</div>
      <div class="info-item"><small>精準客群</small>露營愛好、親子家庭，將流量轉化為品牌力。</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">聯繫方式</div>
    <div class="form-group" id="fg-businessName">
      <label>品牌名稱 <span class="req">*</span></label>
      <input type="text" id="businessName" placeholder="例：山林野炊咖啡" required>
      <div class="error-msg">此欄位為必填</div>
    </div>
    <div class="form-group" id="fg-contactName">
      <label>聯絡人姓名 <span class="req">*</span></label>
      <input type="text" id="contactName" placeholder="請輸入姓名" required>
      <div class="error-msg">此欄位為必填</div>
    </div>
    <div class="form-group" id="fg-phone">
      <label>手機號碼 <span class="req">*</span></label>
      <input type="tel" id="phone" placeholder="09XX-XXX-XXX" required>
      <div class="error-msg">請輸入正確的手機格式</div>
    </div>
    <div class="form-group">
      <label>LINE ID</label>
      <input type="text" id="lineId" placeholder="方便後續聯繫">
    </div>
    <div class="form-group">
      <label>電子信箱</label>
      <input type="email" id="email" placeholder="接收審核通知">
    </div>
  </div>
</div>

<div class="step-page" id="step2">
  <div class="card">
    <div class="card-title">選擇類別 <span class="req" style="font-size:12px; margin-left:5px;">*</span></div>
    <div class="grid-select" id="catGrid">
      <div class="option-box" data-cat="🏕️ 露營裝備"><i>🏕️</i>露營裝備</div>
      <div class="option-box" data-cat="🍳 戶外料理"><i>🍳</i>戶外料理</div>
      <div class="option-box" data-cat="☕ 咖啡茶飲"><i>☕</i>咖啡茶飲</div>
      <div class="option-box" data-cat="🌿 有機農產"><i>🌿</i>有機農產</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">尺寸與設備需求 <span class="req" style="font-size:12px; margin-left:5px;">*</span></div>
    <label>攤位尺寸</label>
    <div class="grid-select" id="sizeGrid" style="margin-bottom:20px;">
      <div class="option-box size-opt" data-size="標準(3x3m)">標準 3x3m</div>
      <div class="option-box size-opt" data-size="加大(3x4.5m)">加大 4.5m</div>
      <div class="option-box size-opt" data-size="餐車位">餐車位</div>
      <div class="option-box size-opt" data-size="特殊尺寸">特殊需求</div>
    </div>
    
    <label>設備需求 (複選)</label>
    <label class="check-item">
      <input type="checkbox" name="equip" value="⚡ 需要用電"> ⚡ 需要用電 (基礎電力)
    </label>
    <label class="check-item">
      <input type="checkbox" name="equip" value="💧 需要用水"> 💧 需要用水 (公設水源)
    </label>
  </div>
</div>

<div class="step-page" id="step3">
  <div class="card">
    <div class="card-title">營運資訊</div>
    <div class="form-group">
      <label>出攤日期需求 <span class="req">*</span></label>
      <select id="preferredDates" required>
        <option value="">請選擇</option>
        <option value="每週六、日">每週六、日</option>
        <option value="僅週六">僅週六</option>
        <option value="僅週日">僅週日</option>
        <option value="彈性配合">彈性配合</option>
      </select>
    </div>
    <div class="form-group">
      <label>預估每日營業額 <span class="req">*</span></label>
      <select id="estimatedRevenue" required>
        <option value="">請選擇金額區間</option>
        <option value="5,000元以下">5,000元以下</option>
        <option value="5,000－10,000元">5,000－10,000元</option>
        <option value="10,000元以上">10,000元以上</option>
      </select>
    </div>
    <div class="form-group">
      <label>商品簡介 <span class="req">*</span></label>
      <textarea id="productDesc" rows="4" placeholder="請簡述您的特色商品..." required></textarea>
    </div>
    <div class="form-group">
      <label>其他備註 (選填)</label>
      <textarea id="notes" rows="2" placeholder="特殊需求或想對我們說的話"></textarea>
    </div>
  </div>
</div>

<div class="step-page" id="step4">
  <div class="card">
    <div class="card-title">最後確認資料</div>
    <div id="summaryContent" style="font-size:14px; line-height:1.8;">
        </div>
    <p style="font-size: 11px; color: var(--text-muted); margin-top: 15px; text-align: center;">
        點擊送出後，我們將於 3-5 個工作天內聯繫您。
    </p>
  </div>
</div>

<div class="btn-row">
  <button class="btn btn-back" id="btnBack" onclick="prevStep()" style="display:none">上一步</button>
  <button class="btn btn-main" id="btnNext" onclick="nextStep()">下一步</button>
</div>

<script>
let currentStep = 1;
const TOTAL_STEPS = 4;
let selectedCat = '';
let selectedSize = '';

// 類別選擇邏輯
document.querySelectorAll('#catGrid .option-box').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('#catGrid .option-box').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedCat = el.dataset.cat;
  });
});

// 尺寸選擇邏輯
document.querySelectorAll('#sizeGrid .option-box').forEach(el => {
  el.addEventListener('click', () => {
    document.querySelectorAll('#sizeGrid .option-box').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedSize = el.dataset.size;
  });
});

function validateStep(step) {
    let isValid = true;
    
    if (step === 1) {
        const fields = ['businessName', 'contactName', 'phone'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (!el.value.trim()) {
                el.parentElement.classList.add('has-error');
                isValid = false;
            } else {
                el.parentElement.classList.remove('has-error');
            }
        });
    } else if (step === 2) {
        if (!selectedCat || !selectedSize) {
            alert("請選擇類別與攤位尺寸");
            isValid = false;
        }
    } else if (step === 3) {
        const fields = ['preferredDates', 'estimatedRevenue', 'productDesc'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (!el.value) {
                el.parentElement.classList.add('has-error');
                isValid = false;
            } else {
                el.parentElement.classList.remove('has-error');
            }
        });
    }
    return isValid;
}

function updateUI() {
  document.getElementById('progressFill').style.width = (currentStep / TOTAL_STEPS * 100) + '%';
  document.getElementById('btnBack').style.display = currentStep > 1 ? 'block' : 'none';
  
  const btnNext = document.getElementById('btnNext');
  if (currentStep === TOTAL_STEPS) {
      btnNext.innerHTML = '🚀 確認送出報名';
      btnNext.classList.add('btn-submit');
  } else {
      btnNext.innerHTML = '下一步';
      btnNext.classList.remove('btn-submit');
  }
  
  for (let i = 1; i <= TOTAL_STEPS; i++) {
    const lbl = document.getElementById('lbl' + i);
    if(lbl) lbl.classList.toggle('active', i === currentStep);
  }
}

function nextStep() {
  if (!validateStep(currentStep)) return;

  if (currentStep === TOTAL_STEPS) {
    submitFinalForm();
    return;
  }

  document.getElementById('step' + currentStep).classList.remove('active');
  currentStep++;
  document.getElementById('step' + currentStep).classList.add('active');
  
  if (currentStep === 4) {
    const equip = [...document.querySelectorAll('input[name=equip]:checked')].map(e=>e.value).join(', ') || '無特別需求';
    document.getElementById('summaryContent').innerHTML = `
      <p><b>品牌名稱</b> ${document.getElementById('businessName').value}</p>
      <p><b>聯絡人</b> ${document.getElementById('contactName').value}</p>
      <p><b>聯絡電話</b> ${document.getElementById('phone').value}</p>
      <p><b>攤位類別</b> ${selectedCat}</p>
      <p><b>需求尺寸</b> ${selectedSize}</p>
      <p><b>設備需求</b> ${equip}</p>
      <p><b>出攤日期</b> ${document.getElementById('preferredDates').value}</p>
      <p><b>預估營收</b> ${document.getElementById('estimatedRevenue').value}</p>
      <p><b>商品簡介</b><br><span style="color:var(--text-muted)">${document.getElementById('productDesc').value}</span></p>
    `;
  }
  updateUI();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function prevStep() {
  document.getElementById('step' + currentStep).classList.remove('active');
  currentStep--;
  document.getElementById('step' + currentStep).classList.add('active');
  updateUI();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function submitFinalForm() {
    // 這裡可以加入 Loading 動態
    const btnNext = document.getElementById('btnNext');
    btnNext.disabled = true;
    btnNext.innerHTML = '提交中...';
    
    // 模擬提交成功
    setTimeout(() => {
        alert("恭喜！報名資料已成功送出，我們將儘速與您聯繫。");
        // 成功後可導向官網或重置頁面
        // window.location.reload(); 
    }, 1500);
    
    // 實際串接 GAS 時請使用：
    /*
    google.script.run.withSuccessHandler(() => {
       alert('送出成功');
    }).submitForm(data);
    */
}
</script>

</body>
</html>
